<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Akun - ITPLN Portal</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">ITPLN Portal</div>
        <nav class="nav-links">
            <a href="inventaris.html">Inventaris</a>
            <a href="stok.html">Stok</a>
            <a href="pendaftaran.html">Pendaftaran</a>
            <a href="akun.html" class="active">Portal Akun</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h2>Autentikasi Akun</h2>
            <form id="formLogin">
                <div class="input-group">
                    <span class="icon">@</span>
                    <input type="text" id="nim" placeholder="NIM Mahasiswa" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Kata Sandi" required>
                </div>
                <button type="submit" class="btn-login">Masuk Sistem</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("formLogin").addEventListener("submit", function(event) {
            event.preventDefault(); 

            let inputNim = document.getElementById("nim").value;
            let inputPassword = document.getElementById("password").value;

            let nimBenar = "202432080";
            let passwordBenar = "admin123";

            if (inputNim === nimBenar && inputPassword === passwordBenar) {
                alert("Login Berhasil! Selamat datang.");
                window.location.href = "inventaris.html"; 
            } else {
                alert("Login Gagal! NIM atau Kata Sandi salah.");
            }
        });
    </script>
</body>
</html>
