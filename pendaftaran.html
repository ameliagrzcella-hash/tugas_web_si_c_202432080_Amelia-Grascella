<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Open Recruitment</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <header>
        <h1>Open Recruitment Asisten</h1>
        <nav>
            <a href="inventaris.html">Inventaris</a>
            <a href="stok.html">Stok Barang</a>
            <a href="pendaftaran.html" class="active">Pendaftaran</a>
            <a href="akun.html">Portal Akun</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Data Identitas Calon Asisten</h2>
            <form>
                <div class="form-group">
                    <label>Nama Lengkap:</label>
                    <input type="text" placeholder="Sesuai KTM">
                </div>

                <div class="form-group">
                    <label>Minat Laboratorium:</label>
                    <select>
                        <option>Information Retrieval</option>
                        <option>Intelligent Computing</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Bahasa Pemrograman:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox"> Python</label>
                        <label><input type="checkbox"> Java</label>
                        <label><input type="checkbox"> PHP</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Visi & Misi:</label>
                    <textarea rows="4"></textarea>
                </div>

                <button type="submit" class="btn-submit">Kirim Aplikasi</button>
            </form>
        </div>
    </main>
</body>
</html>
